<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>任务总览 - 东华倪家</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="identity-gate" class="hidden"></div>

    <div id="main-content" style="display:none">
        <nav class="navbar">
            <div class="nav-brand">东华倪家</div>
            <div class="nav-links">
                <a href="/">任务</a>
                <a href="/stats" class="active">总览</a>
            </div>
            <div class="nav-user">
                <div class="user-switcher">
                    <button class="current-user-badge">选择身份</button>
                    <div class="user-dropdown"></div>
                </div>
                <button class="btn btn-outline btn-sm" onclick="doLogout()" style="color:var(--danger)">退出</button>
            </div>
        </nav>

        <div class="container">
            <!-- 成员卡片 -->
            <div class="member-cards" id="member-cards"></div>

            <!-- 选中成员的任务列表 -->
            <div class="member-detail" id="member-detail" style="display:none">
                <div class="detail-header">
                    <button class="btn btn-outline btn-sm" id="btn-back">← 返回</button>
                    <h2 id="detail-title"></h2>
                </div>
                <div class="member-tasks" id="member-tasks">
                    <div class="empty-state"><p>暂无任务记录</p></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let membersData = [];
        let selectedMember = null;

        function onUserChanged() {
            loadOverview();
        }

        async function loadOverview() {
            if (!getCurrentUserId()) return;
            try {
                const data = await api('/stats');
                membersData = data.members;
                renderMemberCards(data.members, data.summary);
            } catch {}
        }

        function renderMemberCards(members, summary) {
            document.getElementById('member-detail').style.display = 'none';
            selectedMember = null;

            const total = summary.total_tasks || 0;
            const done = summary.total_done || 0;

            document.getElementById('member-cards').innerHTML = `
                <div class="overview-summary">
                    <span>共 ${total} 个任务，已完成 ${done} 个</span>
                </div>
                <div class="cards-grid">
                    ${members.map(m => `
                        <button class="member-overview-card" data-id="${m.member_id}" style="--accent:${m.color}">
                            <div class="moc-avatar" style="background:${m.color}">${m.name[0]}</div>
                            <div class="moc-name">${m.name}</div>
                            <div class="moc-stats">
                                <span>✅ ${m.done_count}</span>
                                <span>📋 ${m.created_count}</span>
                                <span>⏳ ${m.ongoing_count}</span>
                            </div>
                        </button>
                    `).join('')}
                </div>
            `;

            document.querySelectorAll('.member-overview-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = parseInt(card.dataset.id);
                    const member = members.find(m => m.member_id === id);
                    showMemberDetail(member);
                });
            });
        }

        async function showMemberDetail(member) {
            selectedMember = member;
            document.getElementById('member-cards').style.display = 'none';
            document.getElementById('member-detail').style.display = 'block';
            document.getElementById('detail-title').innerHTML = `
                <span class="detail-dot" style="background:${member.color}"></span>
                ${member.name} 的任务
            `;

            try {
                const tasks = await api(`/tasks/member/${member.member_id}`);
                renderMemberTasks(tasks, member);
            } catch {
                document.getElementById('member-tasks').innerHTML =
                    '<div class="empty-state"><p>加载失败</p></div>';
            }
        }

        function renderMemberTasks(tasks, member) {
            const container = document.getElementById('member-tasks');

            if (!tasks || tasks.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>暂无任务记录</p></div>';
                return;
            }

            container.innerHTML = tasks.map(t => {
                const isCreator = t.created_by === member.member_id;
                const isAssignee = t.assigned_to === member.member_id;
                const isDone = t.status === 'done';

                let tag = '';
                if (isCreator && isAssignee && isDone) tag = '<span class="task-badge done">自己完成</span>';
                else if (isCreator && isAssignee) tag = '<span class="task-badge ongoing">自己待办</span>';
                else if (isCreator) tag = '<span class="task-badge created">发布</span>';
                else if (isAssignee && isDone) tag = '<span class="task-badge done">完成</span>';
                else if (isAssignee) tag = '<span class="task-badge ongoing">待办</span>';

                const timeStr = t.status === 'done' && t.completed_at
                    ? t.completed_at
                    : t.created_at;

                return `
                    <div class="member-task-item ${t.status}">
                        <div class="mti-left">
                            <span class="mti-title">${escapeHtml(t.title)}</span>
                            ${t.description ? `<span class="mti-desc">${escapeHtml(t.description)}</span>` : ''}
                        </div>
                        <div class="mti-right">
                            ${tag}
                            <span class="mti-time">${timeStr}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('btn-back').addEventListener('click', () => {
            document.getElementById('member-detail').style.display = 'none';
            document.getElementById('member-cards').style.display = '';
            selectedMember = null;
        });
    </script>
</body>
</html>
